    <style>
       
        body { 
            margin: 0; 
            background: #050510; 
            color: #ddd; 
            font-family: 'PingFang TC', serif; 
            line-height: 1.8; 
            overflow-x: hidden; 
            min-height: 100vh; 
        }

        
        .stars-container, .orbit-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0; animation: flowing-right var(--duration) linear infinite; }
        @keyframes flowing-right { 0% { transform: translateX(0); opacity: 0; } 10% { opacity: 0.5; } 100% { transform: translateX(110vw); opacity: 0; } }
        .orbit { position: absolute; top: 50%; left: 50%; border: 1px solid rgba(162, 155, 254, 0.2); border-radius: 50%; border-right-color: transparent !important; animation: rotate var(--speed) linear infinite; }
        @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        
        /* 1. 基礎樣式：預設隱藏且完全透明 */
.container { 
    display: none; 
    opacity: 0; 
    max-width: 650px; /* 使用你之前調整後的精緻寬度 */
    width: 50%;
    
    /* 關鍵修改：改為 absolute 並設定頂部距離 */
    position: absolute; 
    top: 50px; /* 距離網頁頂部 50px，確保上方留白 */
    left: 50%;
    transform: translateX(-50%); /* 只需水平置中 */
    
    margin-bottom: 50px; /* 底部留白，避免貼齊邊緣 */
    padding: 30px; 
    background: rgba(10, 10, 10, 0.85); 
    backdrop-filter: blur(20px); 
    border-radius: 24px; 
    border: 1px solid rgba(162, 155, 254, 0.2); 
    z-index: 1000; 

}

/* 2. 動畫觸發樣式：當 JS 加上 .show 時才執行動畫 */
.container.show {
    display: block;
    animation: entranceFade 0.8s ease-out forwards;
}

/* 3. 修正後的動畫：將置中的 translate 寫進動畫裡，防止跑位 */
@keyframes entranceFade {
    from { 
        opacity: 0; 
        transform: translate(-50%, 20%); /* 從中心偏下一點開始 */
    }
    to { 
        opacity: 1; 
        transform: translate(-50%, 0%); /* 回到正中心 */
    }
}

        
        .quiz-img-box { 
            width: 100%; 
            aspect-ratio: 16 / 9; 
            background: #1a1a1a; 
            margin: 0 0 35px 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid rgba(162, 155, 254, 0.2);
        }
        .quiz-img-box img { width: 100%; height: 100%; object-fit: contain; transition: opacity 0.5s ease-in-out; }

        .question-text { 
            font-size: 1.3rem; 
            margin-bottom: 40px; 
            text-align: center; 
            letter-spacing: 2px;
            color: #fffde7;
            text-shadow: 0 0 10px rgba(162, 155, 254, 0.4);
        }

        /* 新增：題號文字樣式 */
.question-num {
    font-size: 0.9rem;
    color: #a29bfe; /* 配合主題的淡紫色 */
    letter-spacing: 4px;
    text-align: center;
    margin-bottom: 12px;
    font-weight: 100;
    text-shadow: 0 0 10px rgba(162, 155, 254, 0.5);
}

        /* 選項按鈕 */
        .options-grid { display: grid; gap: 18px; }
        .option-btn { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 253, 231, 0.2); 
            color: #ccc; 
            padding: 20px; 
            border-radius: 15px; 
            cursor: pointer; 
            font-family: serif; 
            font-size: 1.1rem; 
            transition: 0.3s; 
            text-align: left; 
        }
        .option-btn:hover { 
            color: #fffde7; 
            border-color: #fffde7; 
            background: rgba(255, 253, 231, 0.1); 
            transform: translateX(12px); 
        }

        .fade-out { opacity: 0 !important; }

        .back-home { position: fixed; left: 30px; top: 30px; color: #a29bfe; text-decoration: none; font-size: 1.1rem; z-index: 100; transition: 0.3s; }
        .back-home:hover { text-shadow: 0 0 10px #fff; }

        .progress-bar {
            width: 100%; height: 3px;
            background: rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill { width: 0%; height: 100%; background: #a29bfe; transition: width 0.5s ease; }

        /* 結果顯示樣式 */
        .result-star-name { font-size: 3.5rem; color: #fffde7; letter-spacing: 15px; margin: 20px 0; font-weight: 100; text-shadow: 0 0 20px rgba(162, 155, 254, 0.8); }
        .result-desc { color: #aaa; line-height: 2.2; text-align: left; margin-top: 30px; font-size: 1.1rem; border-top: 1px solid rgba(162, 155, 254, 0.2); padding-top: 25px; }
    
        /* 結局容器：改為 Flex 左右排列 */
        .result-container-inner {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 40px; /* 文字與圖片的間距 */
        text-align: left;
        }

        /* 左側文字區 */
        .result-text-content {
        flex: 1.2;
        }

        /* 右側圖片區 */
        .result-image-content {
        flex: 1;
        display: flex;
        justify-content: center;
        }

        /* 結局插圖：加上霓虹光暈 */
        #result-star-img {
        max-width: 100%;
        max-height: 400px;
        height: auto;
        border-radius: 15px;
        border: 1px solid rgba(162, 155, 254, 0.3);
        box-shadow: 0 0 30px rgba(162, 155, 254, 0.4);
        object-fit: contain;
        }

    /* 讓結果標題靠左 */
    .result-star-name {
    text-align: left;
    margin: 10px 0 20px 0;
    }
        /* 手機版修正 */
        @media (max-width: 768px) {
        .container {
        margin: 20px auto; 
        padding: 20px;
        width: 90%; /* 增加間距 */
        }
    
        /* 結局改為上下排列 */
        .result-container-inner {
        flex-direction: column;
        text-align: center;
        }
    
        .result-text-content {
        padding-right: 0;
        margin-bottom: 20px;
        text-align: center;
        }
    
        .result-star-name {
        font-size: 2.5rem;
        text-align: center;
        letter-spacing: 5px;
        }
    
        #result-star-img {
        max-height: 300px; /* 限制圖片高度避免過長 */
        }
        }

        /* 讓選項按鈕更有牌卡的感覺 */
        .option-btn {
        perspective: 1000px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(162, 155, 254, 0.3);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), ;
        }

        .option-btn:hover {
        transform: translateY(-5px) scale(1.02); /* 改為向上浮起，而非向右位移，以區隔 story */
        background: rgba(162, 155, 254, 0.15);
        border-color: #a29bfe;
        }
    
        /* 題目圓圈（星靈） */
    .spirit-node {
    position: absolute;
    /* 縮小尺寸，讓光點更精緻 */
    width: 40px; 
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 50;
    transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    justify-content: center;

    /* 關鍵：讓中心有淡色微光，不再是黑洞 */
    background: radial-gradient(circle, var(--glow-color, rgba(255, 255, 255, 0.4)) 0%, rgba(255, 255, 255, 0) 70%); 
    
    /* 調整光暈亮度與範圍 */
    box-shadow: 
        0 0 25px var(--glow-color, rgba(162, 155, 254, 0.3)),
        inset 0 0 10px rgba(255, 255, 255, 0.1);

    /* 稍微降低模糊度，讓光點形體更具體一點 */
    filter: blur(1px); 
    border: none !important;
}

.spirit-node:hover {
    transform: scale(1.15);
    filter: blur(0px);
    /* 懸停時增加亮度 */
    background: radial-gradient(circle, var(--glow-color, rgba(255, 255, 255, 0.6)) 0%, rgba(255, 255, 255, 0) 80%);
    box-shadow: 0 0 40px var(--glow-color, rgba(162, 155, 254, 0.6));
}

    /* 漂浮動畫 */
    /* 軌道旋轉動畫：負責公轉 */
@keyframes orbit-rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* 抵消旋轉動畫：負責讓光點內的內容（如果有文字）保持正向，並增加一點點自轉晃動感 */
@keyframes counter-rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(-360deg); }
}

/* 調整 spirit-node 的基礎設定 */
.spirit-node {
    position: absolute;
    /* 移除原本的 animation 設定，改由 JS 動態分配 */
    width: 40px; 
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 50;
    transition: box-shadow 0.6s ease, transform 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle, var(--glow-color, rgba(255, 255, 255, 0.4)) 0%, rgba(255, 255, 255, 0) 70%); 
    box-shadow: 0 0 25px var(--glow-color, rgba(162, 155, 254, 0.3));
    filter: blur(1px);
}

    /* 運算中動畫 */
    .loader-orbit {
    width: 60px;
    height: 60px;
    margin: 20px auto;
    border: 3px solid rgba(162, 155, 254, 0.2);
    border-top: 3px solid #fffde7;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

function initBg() {
    const sc = document.getElementById('stars');
    for(let i=0; i<100; i++){
        let s = document.createElement('div');
        s.className = 'star';
        s.style.top = Math.random()*100+'%';
        s.style.width = s.style.height = Math.random()*2+1+'px';
        s.style.left = -20+'px';
        s.style.setProperty('--duration', (Math.random()*20+20)+'s');
        s.style.animationDelay = -Math.random()*20+'s';
        sc.appendChild(s);
    }
    const obf = document.getElementById('orbit-field');
    for(let i=0; i<5; i++){
        let o = document.createElement('div');
        o.className = 'orbit';
        let size = 400 + i*300;
        o.style.width = o.style.height = size+'px';
        o.style.setProperty('--speed', (40+i*20)+'s');
        obf.appendChild(o);
    }
}

    "七殺": "將星，象徵獨立與權威。你勇往直前、不畏艱險，具備大將之風。",
    "破軍": "耗星，象徵創新與破壞。你敢於挑戰舊規則，致力於建立全新的世界。"
};

// --- 3. 測驗控制邏輯 (修正後的關鍵部分) ---
let completedCount = 0;
let finalScores = {};
let remainingQuestions = [...quizData]; // 複製一份題目

// 生成 12 個代表題目的星靈
function initSpiritNodes() {
    const playground = document.getElementById('stars-playground');
    // 稍微調亮顏色，避免在背景中隱形
    const colors = [
        'rgba(162, 155, 254, 1)', 
        'rgba(115, 198, 239, 1)', 
        'rgba(158, 245, 227, 1)', 
        'rgba(247, 137, 255,1)', 
        'rgba(252,177,91,1)', 
        'rgba(249, 238, 203, 1)'
    ];

    for (let i = 0; i < 12; i++) {
        // 1. 創建一個軌道容器 (與螢幕同寬高，中心對齊)
        const orbitLayer = document.createElement('div');
        orbitLayer.style.position = 'absolute';
        orbitLayer.style.top = '0';
        orbitLayer.style.left = '0';
        orbitLayer.style.width = '100vw';
        orbitLayer.style.height = '100vh';
        orbitLayer.style.display = 'flex';
        orbitLayer.style.alignItems = 'center';
        orbitLayer.style.justifyContent = 'center';
        orbitLayer.style.pointerEvents = 'none'; // 容器不阻擋點擊

        // 隨機旋轉速度 (20s ~ 40s 繞一圈)
        const duration = 20 + Math.random() * 30;
        orbitLayer.style.animation = `orbit-rotate ${duration}s linear infinite`;
        
        // 2. 創建星靈光點
        const node = document.createElement('div');
        node.className = 'spirit-node';
        node.style.pointerEvents = 'auto'; // 讓光點可以被點擊

        // --- 新增：隨機大小邏輯 ---
        // 這會產生 30px 到 70px 之間的隨機大小
        const baseSize = Math.random() * 45 + 25; 
        node.style.width = baseSize + 'px';
        node.style.height = baseSize + 'px';
        
        // 隨機半徑：讓光點分布在距離中心 150px 到 400px 的範圍內
        const radius = 150 + Math.random() * 350;
        // 隨機初始角度
        const angle = Math.random() * 360;
        
        // 利用 CSS transform 將光點推到軌道上
        node.style.transform = `rotate(${angle}deg) translateX(${radius}px)`;
        
        // 顏色設定
        const color = colors[i % colors.length];
        node.style.setProperty('--glow-color', color);
        
        // 點擊事件
        node.onclick = () => openQuiz(node);

        // 將光點放入軌道，軌道放入遊樂場
        orbitLayer.appendChild(node);
        playground.appendChild(orbitLayer);
    }
}
function openQuiz(clickedNode) {
    if (remainingQuestions.length === 0) return;

    // 隨機抽取一題
    const randomIndex = Math.floor(Math.random() * remainingQuestions.length);
    const q = remainingQuestions[randomIndex];

    // 更新內容至燈箱 (原本的 quiz-view)
    document.getElementById('q-num-display').innerText = `已收集星語: ${completedCount + 1} / 12`;
    document.getElementById('question-img').src = q.image;
    document.getElementById('question-display').innerText = q.title;
    
    // 進度條
    const progress = ((completedCount + 1) / 12) * 100;
    document.getElementById('progress').style.width = progress + '%';

    const container = document.getElementById('options-container');
    container.innerHTML = '';
    q.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt.text;
        btn.onclick = () => {
            handleOptionClick(opt.scores, clickedNode, randomIndex);
        };
        container.appendChild(btn);
    });

    // 顯示燈箱
    document.getElementById('main-container').style.display = 'block';
    const mainBox = document.getElementById('main-container');
    mainBox.classList.add('show'); // 加入 show 觸發淡入動畫
}

function handleOptionClick(scoreConfig, node, qIndex) {
    // 累加分數
    for (const [star, weight] of Object.entries(scoreConfig)) {
        finalScores[star] = (finalScores[star] || 0) + weight;
    }

    // 隱藏燈箱
    document.getElementById('main-container').style.display = 'none';
    const mainBox = document.getElementById('main-container');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    mainBox.classList.remove('show'); // 移除 Class，重置狀態
    mainBox.style.display = 'none';   // 徹底隱藏

    // 圓圈消失動畫
    node.style.transform = 'scale(0)';
    node.style.opacity = '0';
    setTimeout(() => node.remove(), 500);

    // 移除已答題目並增加計數
    remainingQuestions.splice(qIndex, 1);
    completedCount++;

    if (completedCount >= 12) {
        showAnalyzing(); // 全部答完
    }
}

        </div>
    `;

setTimeout(() => {

const starImages = {

// 修改原本的 window.onload
window.onload = () => {
    initBg();
    initSpiritNodes(); 
};

// 背景音樂控制邏輯
const bgm = document.getElementById('bgm');

// 1. 設定音量 (0.0 ~ 1.0)
bgm.volume = 0.3; 

// 2. 跨頁面接續播放邏輯
window.addEventListener('load', () => {
    // 從瀏覽器記憶中抓取上個頁面的播放進度
    const savedTime = localStorage.getItem('bgmTime');
    if (savedTime) {
        bgm.currentTime = parseFloat(savedTime);
    }

    // 監聽第一次點擊，解決瀏覽器禁止自動播放的問題
    document.addEventListener('click', () => {
        bgm.play();
    }, { once: true }); // 只觸發一次點擊即可
});

// 3. 在離開頁面瞬間，記住目前的播放進度
window.addEventListener('beforeunload', () => {
    localStorage.setItem('bgmTime', bgm.currentTime);
});
