<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星命測驗</title>
    <style>
       
        body { 
            margin: 0; 
            background: #050510; 
            color: #ddd; 
            font-family: 'PingFang TC', serif; 
            line-height: 1.8; 
            overflow-x: hidden; 
            min-height: 100vh; 
        }

        
        .stars-container, .orbit-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0; animation: flowing-right var(--duration) linear infinite; }
        @keyframes flowing-right { 0% { transform: translateX(0); opacity: 0; } 10% { opacity: 0.5; } 100% { transform: translateX(110vw); opacity: 0; } }
        .orbit { position: absolute; top: 50%; left: 50%; border: 1px solid rgba(162, 155, 254, 0.2); border-radius: 50%; border-right-color: transparent !important; animation: rotate var(--speed) linear infinite; }
        @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        
        .container { 
            max-width: 800px; 
            margin: 100px auto; 
            padding: 40px; 
            background: rgba(10, 10, 10, 0.8); 
            backdrop-filter: blur(20px); 
            border-radius: 24px; 
            border: 1px solid rgba(162, 155, 254, 0.15); 
            position: relative; 
            z-index: 10; 
            
            opacity: 0;
            animation: entranceFade 1.2s ease-out forwards;
        }

        @keyframes entranceFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        
        .quiz-img-box { 
            width: 100%; 
            aspect-ratio: 16 / 9; 
            background: #1a1a1a; 
            margin: 0 0 35px 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid rgba(162, 155, 254, 0.2);
        }
        .quiz-img-box img { width: 100%; height: 100%; object-fit: contain; transition: opacity 0.5s ease-in-out; }

        .question-text { 
            font-size: 1.3rem; 
            margin-bottom: 40px; 
            text-align: center; 
            letter-spacing: 2px;
            color: #fffde7;
            text-shadow: 0 0 10px rgba(162, 155, 254, 0.4);
        }

        /* 新增：題號文字樣式 */
.question-num {
    font-size: 0.9rem;
    color: #a29bfe; /* 配合主題的淡紫色 */
    letter-spacing: 4px;
    text-align: center;
    margin-bottom: 12px;
    font-weight: 100;
    text-shadow: 0 0 10px rgba(162, 155, 254, 0.5);
}

        /* 選項按鈕 */
        .options-grid { display: grid; gap: 18px; }
        .option-btn { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 253, 231, 0.2); 
            color: #ccc; 
            padding: 20px; 
            border-radius: 15px; 
            cursor: pointer; 
            font-family: serif; 
            font-size: 1.1rem; 
            transition: 0.3s; 
            text-align: left; 
        }
        .option-btn:hover { 
            color: #fffde7; 
            border-color: #fffde7; 
            background: rgba(255, 253, 231, 0.1); 
            transform: translateX(12px); 
        }

        .fade-out { opacity: 0 !important; }

        .back-home { position: fixed; left: 30px; top: 30px; color: #a29bfe; text-decoration: none; font-size: 1.1rem; z-index: 100; transition: 0.3s; }
        .back-home:hover { text-shadow: 0 0 10px #fff; }

        .progress-bar {
            width: 100%; height: 3px;
            background: rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill { width: 0%; height: 100%; background: #a29bfe; transition: width 0.5s ease; }

        /* 結果顯示樣式 */
        .result-star-name { font-size: 3.5rem; color: #fffde7; letter-spacing: 15px; margin: 20px 0; font-weight: 100; text-shadow: 0 0 20px rgba(162, 155, 254, 0.8); }
        .result-desc { color: #aaa; line-height: 2.2; text-align: left; margin-top: 30px; font-size: 1.1rem; border-top: 1px solid rgba(162, 155, 254, 0.2); padding-top: 25px; }
    
    /* 結局容器：改為 Flex 左右排列 */
.result-container-inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 40px; /* 文字與圖片的間距 */
    text-align: left;
}

/* 左側文字區 */
.result-text-content {
    flex: 1.2;
}

/* 右側圖片區 */
.result-image-content {
    flex: 1;
    display: flex;
    justify-content: center;
}

/* 結局插圖：加上霓虹光暈 */
#result-star-img {
    max-width: 100%;
    max-height: 400px;
    height: auto;
    border-radius: 15px;
    border: 1px solid rgba(162, 155, 254, 0.3);
    box-shadow: 0 0 30px rgba(162, 155, 254, 0.4);
    object-fit: contain;
}

/* 讓結果標題靠左 */
.result-star-name {
    text-align: left;
    margin: 10px 0 20px 0;
}
    /* 手機版修正 */
@media (max-width: 768px) {
    .container {
        margin: 20px auto; 
        padding: 20px;
        width: 90%; /* 增加間距 */
    }
    
    /* 結局改為上下排列 */
    .result-container-inner {
        flex-direction: column;
        text-align: center;
    }
    
    .result-text-content {
        padding-right: 0;
        margin-bottom: 20px;
        text-align: center;
    }
    
    .result-star-name {
        font-size: 2.5rem;
        text-align: center;
        letter-spacing: 5px;
    }
    
    #result-star-img {
        max-height: 300px; /* 限制圖片高度避免過長 */
    }
}
    
    </style>
</head>
<body>

    <audio id="bgm" loop>
    <source src="soft.mp3" type="audio/mpeg">
    </audio>
    
    <div class="stars-container" id="stars"></div>
    <div class="orbit-container" id="orbit-field"></div>
    <a href="index.html" class="back-home">← 返回星盤</a>

    <div class="container" id="main-container">
        <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
        
        <div id="quiz-view">
            <div class="question-num" id="q-num-display"></div>
            <div class="quiz-img-box">
                <img id="question-img" src="" alt="">
            </div>
            <div class="question-text" id="question-display"></div>
            <div class="options-grid" id="options-container"></div>
        </div>

        <div id="result-view" style="display: none; width: 100%;">
    <div class="result-container-inner">
        <div class="result-text-content">
            <p style="color: #a29bfe; letter-spacing: 5px; font-size: 0.9rem;">測驗結果：你的守護主星為</p>
            <h1 id="result-star" class="result-star-name"></h1>
            <div class="result-desc" id="result-desc"></div>
            <button class="option-btn" onclick="location.reload()" style="margin-top: 40px;">重啟星路</button>
        </div>

        <div class="result-image-content">
            <img id="result-star-img" src="" alt="星曜圖片">
        </div>
    </div>
</div>
    </div>

    

    <script>
        
        
function initBg() {
    const sc = document.getElementById('stars');
    for(let i=0; i<100; i++){
        let s = document.createElement('div');
        s.className = 'star';
        s.style.top = Math.random()*100+'%';
        s.style.width = s.style.height = Math.random()*2+1+'px';
        s.style.left = -20+'px';
        s.style.setProperty('--duration', (Math.random()*20+20)+'s');
        s.style.animationDelay = -Math.random()*20+'s';
        sc.appendChild(s);
    }
    const obf = document.getElementById('orbit-field');
    for(let i=0; i<5; i++){
        let o = document.createElement('div');
        o.className = 'orbit';
        let size = 400 + i*300;
        o.style.width = o.style.height = size+'px';
        o.style.setProperty('--speed', (40+i*20)+'s');
        obf.appendChild(o);
    }
}

// --- 題庫資料

    {

            { text: "安頓家人，過上安穩的生活", scores: { "天府": 3, "天相": 2, "天府": 1 } }
        ]
    },
    {

        image: "4.PNG",
        options: [
            { text: "太固執，有時候說話會不小心傷害到重要的人", scores: { "廉貞": 3, "紫微": 2, "破軍": 1 } },
            { text: "光用想的，要做就會拖延症發作", scores: { "巨門": 3, "天府": 3, "天機": 2 } },
            { text: "太容易心軟，難拒絕他人", scores: { "天梁": 3, "天相": 2, "天府": 1 } }
        ]
    }
    
];

const starResults = {
    "紫微": "帝星，象徵領導與尊貴。你擁有天生的領袖氣質，處事穩重且具備極佳的責任感。",

// --- 3. 測驗控制邏輯 (修正後的關鍵部分) ---
let currentIdx = 0;
let finalScores = {}; 

function updateQuiz() {
    const q = quizData[currentIdx];
    if(!q) return;
    // 新增：動態計算並顯示題號 (目前題號 / 總題數)
document.getElementById('q-num-display').innerText = `Q${currentIdx + 1} / ${quizData.length}`;

    const imgEl = document.getElementById('question-img');
    imgEl.src = q.image;
    document.getElementById('question-display').innerText = q.title;
    
    // 進度條
    const progress = ((currentIdx + 1) / quizData.length) * 100;
    document.getElementById('progress').style.width = progress + '%';

    const container = document.getElementById('options-container');
    container.innerHTML = '';
    q.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt.text;
        
        btn.onclick = () => handleOptionClick(opt.scores);
        container.appendChild(btn);
    });
}

function handleOptionClick(scoreConfig) {
    
    for (const [star, weight] of Object.entries(scoreConfig)) {
        finalScores[star] = (finalScores[star] || 0) + weight;
    }

    currentIdx++;
    window.scrollTo({ top: 0, behavior: 'smooth' });

    if (currentIdx >= quizData.length) {
        showResult();
    } else {
        const imgEl = document.getElementById('question-img');
        imgEl.classList.add('fade-out');
        setTimeout(() => {
            updateQuiz();
            setTimeout(() => imgEl.classList.remove('fade-out'), 50);
        }, 500);
    }
}


function showResult() {
    document.getElementById('quiz-view').style.display = 'none';
    document.getElementById('result-view').style.display = 'block';

    // 1. 找出得分最高的星曜
    let maxStar = "";
    let maxScore = -1;
    for (const [star, score] of Object.entries(finalScores)) {
        if (score > maxScore) {
            maxScore = score;
            maxStar = star;
        }
    }

    // 防呆：預設紫微
    if (!maxStar) maxStar = "紫微";

    // 2. 填入文字結果
    document.getElementById('result-star').innerText = maxStar;
    document.getElementById('result-desc').innerText = starResults[maxStar] || "你的星曜正在編織中...";

    // 這裡就是讓你「直接貼上圖片路徑」的地方
const starImages = {
    "紫微": "紫微.PNG",  
    "天機": "天機.PNG",
    "太陽": "太陽.PNG",
    "武曲": "武曲.PNG",
    "天同": "天同.PNG",
    "廉貞": "廉貞.PNG",
    "天府": "天府.PNG",
    "太陰": "太陰.PNG",
    "貪狼": "貪狼.PNG",
    "巨門": "巨門.PNG",
    "天相": "天相.PNG",
    "天梁": "天梁.PNG",
    "七殺": "七殺.PNG",
    "破軍": "破軍.PNG"
};

// 3. --- 修改這裡：直接從對照表抓取路徑 ---
    const imagePath = starImages[maxStar]; 
    if (imagePath) {
        document.getElementById('result-star-img').src = imagePath;
    }


}

window.onload = () => {
    initBg();
    updateQuiz();
};

// 背景音樂控制邏輯
const bgm = document.getElementById('bgm');

// 1. 設定音量 (0.0 ~ 1.0)
bgm.volume = 0.3; 

// 2. 跨頁面接續播放邏輯
window.addEventListener('load', () => {
    // 從瀏覽器記憶中抓取上個頁面的播放進度
    const savedTime = localStorage.getItem('bgmTime');
    if (savedTime) {
        bgm.currentTime = parseFloat(savedTime);
    }

    // 監聽第一次點擊，解決瀏覽器禁止自動播放的問題
    document.addEventListener('click', () => {
        bgm.play();
    }, { once: true }); // 只觸發一次點擊即可
});

// 3. 在離開頁面瞬間，記住目前的播放進度
window.addEventListener('beforeunload', () => {
    localStorage.setItem('bgmTime', bgm.currentTime);
});

    </script>
</body>
</html>
