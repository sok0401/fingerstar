<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>角色介紹</title>
    <style>
        body { 
            margin: 0; 
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #050510 100%); 
            color: white; 
            font-family: 'PingFang TC', 'serif'; 
            overflow: hidden; 
            height: 100vh;
            display: flex;
            align-items: center;
        }

        /* 背景粒子 */
        .stars-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0; animation: flowing-right var(--duration) linear infinite; }
        @keyframes flowing-right { 0% { transform: translateX(0); opacity: 0; } 10% { opacity: 0.5; } 100% { transform: translateX(110vw); opacity: 0; } }

        .char-wrapper {
            width: 100vw;
            overflow: hidden; 
            white-space: nowrap;
            padding: 0 5vw;
            display: flex;
            align-items: center;
        }

        /* 燈箱樣式 */
        .char-card {
            display: inline-block;
            flex: 0 0 auto;
            width: 260px; 
            height: 570px;
            margin: 0 -30px; 
            position: relative;
            background: #151525;
            transform: skewX(-15deg); 
            overflow: hidden;
            border: 1px solid rgba(162, 155, 254, 0.3);
            transition: width 0.8s cubic-bezier(0.19, 1, 0.22, 1), transform 0.4s, border-color 0.4s;
            cursor: pointer;
            z-index: 1;
        }

        .char-card.active {
            width: 850px; 
            z-index: 100;
            border-color: #fffde7;
            box-shadow: 0 0 50px rgba(162, 155, 254, 0.3);
            transform: skewX(-15deg) scale(1.02);
        }

        .skew-fix {
            width: 100%; height: 100%;
            transform: skewX(15deg); 
            display: flex; 
            position: relative;
        }

        .img-box {
            width: 450px; 
            height: 100%;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .char-img { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            opacity: 0.5; 
            transition: 0.5s; 
            transform: scale(1.0); 
        }
        .char-card:hover .char-img, .char-card.active .char-img { opacity: 0.9; }

        
        .char-name-box {
            position: absolute; 
            left: 10%; 
            bottom: 12%; 
            width: 0; 
            height: 80px;
            overflow: hidden; 
            transition: width 0.7s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex; 
            align-items: center; 
            white-space: nowrap;
            pointer-events: none;
            z-index: 20;
        }

        
        .char-card:not(.active):hover .char-name-box { 
            width: 250px; 
        }

        
        .char-card.active .char-name-box {
            display: none;
        }

        .hover-name {
            font-size: 2.5rem;
            font-weight: 100;
            letter-spacing: 12px;
            color: #fff;
            text-shadow: 0 0 15px rgba(162, 155, 254, 0.8), 2px 2px 4px rgba(0,0,0,0.9);
        }

        /* 展開資訊區 */
        .char-info {
            width: 530px; 
            height: 100%;
            padding: 30px 40px 30px 8px;
            box-sizing: border-box;
            white-space: normal; 
            opacity: 0;
            transform: translateX(-30px);
            transition: opacity 0.5s 0.3s, transform 0.5s 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .char-card.active .char-info {
            opacity: 1;
            transform: translateX(0);
        }

        .char-name-title { 
            font-size: 3.0rem; 
            font-weight: 100; 
            letter-spacing: 15px; 
            color: #fffde7; 
            margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(255, 253, 231, 0.5);
        }
        .char-desc {
            font-size: 1.1rem;
            color: #ccc;
            line-height: 1.7;
            letter-spacing: 2px;
            font-family: serif;
        }

        .back-home { position: fixed; left: 40px; top: 40px; color: #a29bfe; text-decoration: none; font-size: 1.1rem; z-index: 200; }
    </style>
</head>
<body>

    <audio id="bgm" loop>
    <source src="soft.mp3" type="audio/mpeg">
    </audio>
    
    <div class="stars-container" id="stars"></div>
    <a href="index.html" class="back-home">← 返回星盤</a>

    <div class="char-wrapper" id="char-wrapper"></div>

    <script>
        // 背景粒子
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = star.style.height = Math.random() * 2 + 1 + 'px';
            const duration = Math.random() * 25 + 20;
            star.style.setProperty('--duration', duration + 's');
            star.style.animationDelay = -Math.random() * duration + 's';
            starsContainer.appendChild(star);
        }

        // 角色資料：完整 14 顆主星
const characters = [
    { name: "紫微", img: "紫微.PNG", desc: "北斗主星、帝星，五行屬土，代表著領導力與權重。<br>事業宮主，當位居事業宮時，力量最強。<br>紫微星坐命宮者，擁強烈的好奇心與卓越的管理能力，愛發號司令，具有威嚴感與責任心，在群體中往往扮演引領者的角色。" },
    { name: "天機", img: "天機.PNG", desc: "南斗將星，五行屬木，代表著智慧與精神，思想敏捷，博學而多聞。<br>兄弟宮主，當位居兄弟宮時，益結交才藝智慧之友。<br>天機星坐命宮者，個性溫和，反應敏捷，擅長策劃與分析。鬼計多端，常會玩一些小聰明，但也容易因為考慮過多而產生精神上的焦慮與壓力。" },
    { name: "太陽", img: "太陽.PNG", desc: "中天主星，屬陽火，代表事業與博愛，不拘小節，不喜受人支配。<br>事業宮主，位居事業宮時，廟旺為主管階層。<br>太陽星坐命宮者，如烈日般灑脫且熱情、大方、敢愛敢恨，但有虛榮心，不論成就大小與否，都可能難免於辛勤勞碌。" },
    { name: "武曲", img: "武曲.PNG", desc: "北斗將星，五行屬金，代表金錢、剛毅、果決且務實。<br>財帛宮主，幫位居財帛宮時，力較大，在命宮田宅宮位都主財。<br>武曲星坐命宮者，具有開創的精神與極強的執行力，是典型的行動派，有些急躁，但在情感表達上較為生硬、不擅修飾。" },
    { name: "天同", img: "天同.PNG", desc: "南斗星，五行屬水，象徵圓融、享樂與純真。<br>福德宮主，當位居福德宮時，有消災解厄益壽延年的特質。<br>天同星坐命宮者，待人親切，懂得享受生活、安逸，是為穩重之人，但好奇心強，卻缺乏耐性，也可能因此顯得缺乏進取心，容易隨遇而安。" },
    { name: "廉貞", img: "廉貞.PNG", desc: "北斗星，五行屬火，在中天界統御囚獄，代表縝密、外交與情感。<br>事業宮主，在身宮命宮為次桃花，當位居事業宮時，可掌權。<br>廉貞星坐命宮者，性格複雜，具有極強的觀察力，反應力特別快，在公事上遊刃有餘，但也是為次桃花星，內心常在理智與情感間掙扎。" },
    { name: "天府", img: "天府.PNG", desc: "南斗主星、令星，五行屬土，代表財庫、富足與穩重。<br>衣祿之神，財帛宮主、田宅宮主。<br>天府星坐命宮者，與紫微同為主星，心胸開闊，外柔內剛，管理與組織能力強，較為保守，缺少主動性、企圖心，生活品味高雅且性格溫厚，但也可能顯得過於怠惰，安於現狀。" },
    { name: "太陰", img: "太陰.PNG", desc: "中天主星，五行屬水，代表明朗、聖潔與浪漫。<br>田宅宮主，當位居田宅宮為時，主地產多。<br>太陰星坐命宮者，心性溫和，如明月般溫柔、含蓄，天生浪漫，情感豐富且具有高度的審美觀，偏好幽靜的生活環境，內心戲較多，有時過於追求理想，容易逃避現實。" },
    { name: "貪狼", img: "貪狼.PNG", desc: "北斗星，五行屬木，亦有水性，代表才藝、慾望與機會。<br>教化之星，掌管禍福之神，桃花星。<br>貪狼星坐命宮者，是多才多藝的現實主義者，八面玲瓏，相當愛好自由，對新鮮事物充滿好奇，常在社交場合光芒四射，但喜歡享受，慾望較強，生活容易起伏不定。" },
    { name: "巨門", img: "巨門.PNG", desc: "北斗星，五行屬水，略含土性，代表是非、研究與口才。<br>是非之神、官祿之神、暗曜。<br>巨門星坐命宮者，具有極佳的洞察力與辯才，能言善道，主觀強烈，喜愛研究、探討，通常多學少精，但性格有些敏感，常因心直口快而引發糾紛。" },
    { name: "天相", img: "天相.PNG", desc: "南斗星，五行屬水，代表慈祥、平衡與誠信。<br>事業宮主、輔佐之星、印星。<br>天相星坐命宮者，為人敦厚，待人豪爽，行事小心具正義感，是天生的輔佐人才，注重衣食享受與外在，雖吉星可是卻辛勞，但有時會顯得缺乏主見。" },
    { name: "天梁", img: "天梁.PNG", desc: "南斗星，五行屬土，代表長壽、宗教與傳統。<br>父母之星、益壽蔭福之神、蔭星。<br>天梁星坐命宮者，具有長者之風，耿直，心地和善，樂於助人，常能在危難中逢凶化吉，有傲氣，愛管閒事，但也可能因過於堅持原則而顯得囉嗦。" },
    { name: "七殺", img: "七殺.PNG", desc: "南斗星，五行屬金，火化之金，代表權威、剛毅與肅殺。<br>戰鬥之神、孤剋之星。<br>七殺星坐命宮者，性格剛烈，好勝、自尊心強，具有正義感，不畏艱難且極具開創性，不喜聽令於人，情緒喜怒無常，常以事業為精神寄託，內心孤傲。" },
    { name: "破軍", img: "破軍.PNG", desc: "北斗星，五行屬水，代表破壞、創新與衝動。<br>虛耗之神、孤獨星。<br>破軍星坐命宮者，個性豪邁、果斷、勇敢正直，有領導能力，不會滿足於現狀，我行我素，六親緣份較淡，性格求新求變，但也容易因為衝動而付出沉重代價。" }
];

        const wrapper = document.getElementById('char-wrapper');
        characters.forEach((char, index) => {
            const card = document.createElement('div');
            card.className = 'char-card';
            card.innerHTML = `
                <div class="skew-fix">
                    <div class="img-box">
                        <img src="${char.img}" class="char-img">
                        <div class="char-name-box">
                            <span class="hover-name">${char.name}</span>
                        </div>
                    </div>
                    <div class="char-info">
                        <h2 class="char-name-title">${char.name}</h2>
                        <p class="char-desc">${char.desc}</p>
                    </div>
                </div>
            `;

            card.onclick = (e) => {
                const isActive = card.classList.contains('active');
                document.querySelectorAll('.char-card').forEach(c => c.classList.remove('active'));
                if (!isActive) {
                    card.classList.add('active');
                    setTimeout(() => {
                        targetScroll = card.offsetLeft - (window.innerWidth / 2) + (850 / 2);
                    }, 100);
                }
            };

            wrapper.appendChild(card);
        });

        // 慣性捲動系統
        let targetScroll = 0;
        let currentScroll = 0;
        const lerpFactor = 0.08;

        window.addEventListener('wheel', (e) => {
            e.preventDefault();
            targetScroll += e.deltaY * 1.5;
            const maxScroll = wrapper.scrollWidth - window.innerWidth;
            targetScroll = Math.max(0, Math.min(targetScroll, maxScroll));
        }, { passive: false });

        function smoothScroll() {
            currentScroll += (targetScroll - currentScroll) * lerpFactor;
            wrapper.scrollLeft = currentScroll;
            requestAnimationFrame(smoothScroll);
        }
        smoothScroll();

// 背景音樂控制邏輯
const bgm = document.getElementById('bgm');

// 1. 設定音量 (0.0 ~ 1.0)
bgm.volume = 0.3; 

// 2. 跨頁面接續播放邏輯
window.addEventListener('load', () => {
    // 從瀏覽器記憶中抓取上個頁面的播放進度
    const savedTime = localStorage.getItem('bgmTime');
    if (savedTime) {
        bgm.currentTime = parseFloat(savedTime);
    }

    // 監聽第一次點擊，解決瀏覽器禁止自動播放的問題
    document.addEventListener('click', () => {
        bgm.play();
    }, { once: true }); // 只觸發一次點擊即可
});

// 3. 在離開頁面瞬間，記住目前的播放進度
window.addEventListener('beforeunload', () => {
    localStorage.setItem('bgmTime', bgm.currentTime);
});

    </script>
</body>
</html>
